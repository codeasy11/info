    // 全局
    let currentLang = "zh";
    let currentCategory = "all";

    function getLocalized(obj, field) {
        if (!obj) return "";
        if (typeof obj === 'string') return obj;
        return obj[currentLang] || obj["zh"] || "";
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 渲染类别按钮
    function renderCategories() {
        const container = document.getElementById("categoriesContainer");
        if (!container) return;
        container.innerHTML = "";
        CATEGORIES.forEach(cat => {
            const btn = document.createElement("button");
            btn.className = "cat-btn";
            if (currentCategory === cat.key) btn.classList.add("active");
            btn.textContent = getLocalized(cat.label);
            btn.dataset.key = cat.key;
            btn.addEventListener("click", () => {
                currentCategory = cat.key;
                renderCategories();
                renderProducts();
                window.scrollTo({ top: 0, behavior: "smooth" });
            });
            container.appendChild(btn);
        });
    }

    // 渲染改性塑料分组表格
    function renderPlasticsGroup(group) {
        const groupName = getLocalized(group.groupName);
        const items = group.items;
        const thGrade = currentLang === "zh" ? "牌号" : "Grade";
        const thDesc = currentLang === "zh" ? "描述" : "Description";
        const thType = currentLang === "zh" ? "类别" : "Type";
        const thApp = currentLang === "zh" ? "应用领域" : "Application";

        let tableRows = '';
        items.forEach(item => {
            const desc = getLocalized(item.desc);
            const type = getLocalized(item.type);
            const app = getLocalized(item.application);
            tableRows += `
                <tr>
                    <td style="white-space: nowrap;">${escapeHtml(item.grade)}</td>
                    <td>${escapeHtml(desc)}</td>
                    <td>${escapeHtml(type)}</td>
                    <td>${escapeHtml(app)}</td>
                </tr>
            `;
        });
        return `
            <div class="plastics-group" data-group="${group.groupKey}">
                <div class="group-header">
                    <span>${escapeHtml(groupName)}</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="group-content">
                    <table class="product-table">
                        <thead>
                            <tr><th>${thGrade}</th><th>${thDesc}</th><th>${thType}</th><th>${thApp}</th></tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }

                            <div class="product-title">${escapeHtml(getLocalized(cert.title))}</div>
                            <div class="product-desc">${escapeHtml(getLocalized(cert.desc))}</div>
                        </div>
                    </div>
                `;
            });
            html += `</div></div>`;
            container.innerHTML = html;
            attachCollapseEvents();
            return;
        }

        if (currentCategory === "Masterbatch") {
            let html = `<div class="products-grid">`;
            MASTERBATCH.forEach(p => {
                html += `
                    <div class="product-card">
                        <img class="card-img" src="${p.imageUrl}" loading="lazy">
                        <div class="card-content">
                            <div class="badge-category">${getLocalized(CATEGORIES.find(c=>c.key==='Masterbatch').label)}</div>
                            <div class="product-title">${escapeHtml(getLocalized(p.title))}</div>
                            <div class="product-desc">${escapeHtml(getLocalized(p.desc))}</div>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            container.innerHTML = html;
            return;
        }

        if (currentCategory === "ModifiedPlastics") {
            let html = ``;
            PLASTICS_GROUPS.forEach(group => {
                html += renderPlasticsGroup(group);
            });
            container.innerHTML = html;
            attachCollapseEvents();
            return;
        }

        if (currentCategory === "Equipment") {
            let html = `<div class="products-grid">`;
            EQUIPMENT.forEach(equip => {
                html += `
                    <div class="product-card">
                        <img class="card-img" src="${equip.imageUrl}" loading="lazy">
                        <div class="card-content">
                            <div class="badge-category">${getLocalized(CATEGORIES.find(c=>c.key==='Equipment').label)}</div>
                            <div class="product-title">${escapeHtml(getLocalized(equip.title))}</div>
                            <div class="product-desc">${escapeHtml(getLocalized(equip.desc))}</div>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            container.innerHTML = html;
            return;
        }

        if (currentCategory === "Certificates") {
            let html = `<div class="products-grid">`;
            CERTIFICATES.forEach(cert => {
                html += `
                    <div class="product-card cert-card">
                        <img class="card-img" src="${cert.imageUrl}" loading="lazy">
                        <div class="card-content">
                            <div class="badge-category">${getLocalized(CATEGORIES.find(c=>c.key==='Certificates').label)}</div>
                            <div class="product-title">${escapeHtml(getLocalized(cert.title))}</div>
                            <div class="product-desc">${escapeHtml(getLocalized(cert.desc))}</div>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            container.innerHTML = html;
            return;
        }
    }

    function attachCollapseEvents() {
        document.querySelectorAll('.group-header').forEach(header => {
            header.removeEventListener('click', toggleGroup);
            header.addEventListener('click', toggleGroup);
        });
    }
    function toggleGroup(e) {
        const header = e.currentTarget;
        const content = header.nextElementSibling;
        const icon = header.querySelector('i');
        if (content.classList.contains('collapsed')) {
            content.classList.remove('collapsed');
            icon.classList.remove('fa-chevron-right');
            icon.classList.add('fa-chevron-down');
        } else {
            content.classList.add('collapsed');
            icon.classList.remove('fa-chevron-down');
            icon.classList.add('fa-chevron-right');
        }
    }

    function updateStaticTexts() {
        document.querySelectorAll(".lang-btn").forEach(btn => {
            const langVal = btn.dataset.lang;
            if (langVal === currentLang) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        document.getElementById("hero-title").innerText = currentLang === "zh" ? "✨ 功能母粒 · 改性塑料" : "✨ Masterbatch & Modified Plastics";
        document.getElementById("hero-sub").innerText = currentLang === "zh" ? "探索我们的全系列产品、资质荣誉与公司实力" : "Explore our full range of products, certificates & company strength";
        const contactTitle = document.getElementById("contactTitle");
        if (contactTitle) contactTitle.innerText = currentLang === "zh" ? "📞 联系我们" : "📞 Contact Us";
        renderContact();
    }

    function refreshUI() {
        renderCategories();
        renderProducts();
        updateStaticTexts();
        localStorage.setItem("exhibition_lang", currentLang);
    }

    function initLanguageSwitcher() {
        document.querySelectorAll(".lang-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const newLang = btn.dataset.lang;
                if (newLang === currentLang) return;
                currentLang = newLang;
                refreshUI();
            });
        });
    }

    function loadPreferredLanguage() {
        const saved = localStorage.getItem("exhibition_lang");
        if (saved === "zh" || saved === "en") currentLang = saved;
        else currentLang = "zh";
        updateStaticTexts();
    }

    function init() {
        loadPreferredLanguage();
        initLanguageSwitcher();
        renderCategories();
        renderProducts();
        updateStaticTexts();
    }
    init();
</script>
</body>
</html>
